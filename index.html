<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Dashboard</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f6f8;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.35);
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.12), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.1), transparent 40%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: min(100%, 520px);
      padding: 3rem 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      text-align: center;
      box-shadow:
        0 24px 48px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.85rem;
      margin-bottom: 1.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 999px;
    }

    .badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      margin: 0 auto 1.75rem;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .message {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 32ch;
      margin: 0 auto;
    }

    footer {
      position: absolute;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: rgba(139, 156, 179, 0.6);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="dashboard-title">
      <div class="badge">Coming Soon</div>
      <h1 id="dashboard-title">Support Dashboard</h1>
      <p class="subtitle">We're building something new.</p>
      <div class="divider" aria-hidden="true"></div>
      <p class="message">
        This dashboard is under construction. Check back soon for updates.
      </p>
    </section>
    <footer>&copy; 2026 Support Dashboard</footer>
  </main>
</body>
</html>
